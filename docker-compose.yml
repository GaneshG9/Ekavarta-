version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: ekavarta-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ekavarta123
      MONGO_INITDB_DATABASE: ekavarta
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ekavarta-network

  # Ekavarta Application
  app:
    build: .
    container_name: ekavarta-app
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://admin:ekavarta123@mongodb:27017/ekavarta?authSource=admin
      - JWT_SECRET=your_jwt_secret_here
      - PORT=5000
    ports:
      - "5000:5000"
    networks:
      - ekavarta-network

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: ekavarta-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - app
    networks:
      - ekavarta-network

volumes:
  mongodb_data:

networks:
  ekavarta-network:
    driver: bridge